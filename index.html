<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lara Anchor ⚓</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-teal-950 to-cyan-900">
	<div class="text-center px-6">
		<!-- Logo / Title -->
		<h1 class="text-5xl font-extrabold text-white mb-4 tracking-tight">⚓ Lara Anchor</h1>
		<p class="text-gray-300 text-lg mb-10 max-w-xl mx-auto">
			A lightweight, production-ready Docker setup for Laravel.
			Powered by Alpine Linux, Nginx, PHP-FPM, MySQL, Redis & Node.
		</p>

		<!-- Curl Script Box -->
		<div
			class="bg-slate-800/90 border border-slate-700 shadow-xl rounded-xl p-6 max-w-lg mx-auto flex justify-center">
			<div class="text-center">
				<p class="text-gray-400 mb-2 font-mono text-sm"># Run this in your terminal</p>
				<code class="text-green-400 text-sm font-mono block">
					curl -s https://lara-anchor.netlify.app/install.sh | bash
				</code>
			</div>
		</div>

		<!-- Footer -->
		<p class="mt-10 text-gray-500 text-sm">Made for Laravel devs</p>
	</div>
</body>

</html>
